<!DOCTYPE html>
<html>
<head>
    <title>Nexus Chat - Login & Register</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css">
</head>
<body class="container">
    <!-- Login Page Container -->
    <h1 class="title">💬 Nexus Chat</h1>
    <p class="subtitle-text">Connect & Share in Real-time</p>
    
    <form id="loginForm" class="form-container" method="post">
        <h2 class="form-title">Login</h2>
        
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
        
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        
        <div class="action-button">
            <input type="submit" value="Login">
            <input type="button" id="registerBtn" class="register-btn" value="Register">
        </div>
    </form>

    <!-- Success Modal -->
    <div id="customAlert" class="modal">
        <div class="modal-content">
            <span class="modal-icon">✓</span>
            <p>Registration successful! You can proceed to login</p>
            <button id="closeButton" class="close-btn" onclick="hideCustomAlert()">Close</button>
        </div>
    </div>
    
    <div id="overlay" class="overlay"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
